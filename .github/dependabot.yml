version: 2
updates:
  # AI Chatbot (client/) npm dependencies
  - package-ecosystem: "npm"
    directory: "/client"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
